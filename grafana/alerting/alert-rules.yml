apiVersion: 1

groups:
  - orgId: 1
    name: auth_security_alerts
    folder: Seguranca
    interval: 10s
    rules:
      - uid: brute_force_detected
        title: Brute Force Detectado
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: "rate(login_failures_total[1m]) > 0.166"
              intervalMs: 10000
              maxDataPoints: 100
              refId: A
        noDataState: NoData
        execErrState: Error
        for: 30s
        annotations:
          summary: "Mais de 10 falhas de login em 1 minuto detectadas"
        labels:
          severity: critical

      - uid: auth_timeout_high
        title: Timeout Elevado na Autenticacao
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: "rate(auth_request_duration_seconds_sum[1m]) / rate(auth_request_duration_seconds_count[1m]) > 3"
              intervalMs: 10000
              maxDataPoints: 100
              refId: A
        noDataState: NoData
        execErrState: Error
        for: 30s
        annotations:
          summary: "Latencia media de autenticacao acima de 3 segundos"
        labels:
          severity: warning

  - orgId: 1
    name: finance_alerts
    folder: Financeiro
    interval: 10s
    rules:
      - uid: pix_failure_high
        title: Falha PIX Elevada
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: "rate(pix_failures_total[1m]) > 0.083"
              intervalMs: 10000
              maxDataPoints: 100
              refId: A
        noDataState: NoData
        execErrState: Error
        for: 30s
        annotations:
          summary: "Mais de 5 falhas PIX em 1 minuto detectadas"
        labels:
          severity: critical

      - uid: finance_latency_critical
        title: Latencia Critica Financeira
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: "rate(finance_request_duration_seconds_sum[1m]) / rate(finance_request_duration_seconds_count[1m]) > 3"
              intervalMs: 10000
              maxDataPoints: 100
              refId: A
        noDataState: NoData
        execErrState: Error
        for: 30s
        annotations:
          summary: "Tempo medio de resposta financeiro acima de 3 segundos"
        labels:
          severity: warning

  - orgId: 1
    name: advanced_security_alerts
    folder: Seguranca Avancada
    interval: 10s
    rules:
      - uid: advanced_brute_force
        title: Brute Force Avancado Detectado
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: "rate(brute_force_attempts_total[1m]) > 0.25"
              intervalMs: 10000
              maxDataPoints: 100
              refId: A
        noDataState: NoData
        execErrState: Error
        for: 30s
        annotations:
          summary: "Mais de 15 tentativas de brute force em 1 minuto"
        labels:
          severity: critical

      - uid: suspicious_activity_spike
        title: Pico de Atividade Suspeita
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus
            model:
              expr: "rate(suspicious_actions_total[2m]) > 0.041"
              intervalMs: 10000
              maxDataPoints: 100
              refId: A
        noDataState: NoData
        execErrState: Error
        for: 30s
        annotations:
          summary: "Mais de 5 acoes suspeitas em 2 minutos"
        labels:
          severity: critical

  - orgId: 1
    name: incident_alerts
    folder: Incidentes
    interval: 10s
    rules:
      - uid: service_down_alert
        title: Servico DOWN
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: "active_incidents_total > 0"
              intervalMs: 10000
              maxDataPoints: 100
              refId: A
        noDataState: NoData
        execErrState: Error
        for: 30s
        annotations:
          summary: "Servico com incidentes ativos ha mais de 30 segundos"
        labels:
          severity: critical

      - uid: error_5xx_explosion
        title: Explosao de Erros 5xx
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: "rate(http_errors_total{status_code=~'5..'}[1m]) > 0.33"
              intervalMs: 10000
              maxDataPoints: 100
              refId: A
        noDataState: NoData
        execErrState: Error
        for: 30s
        annotations:
          summary: "Mais de 20 erros 5xx por minuto detectados"
        labels:
          severity: critical

      - uid: extreme_latency
        title: Latencia Extrema
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: "rate(incident_request_duration_seconds_sum[1m]) / rate(incident_request_duration_seconds_count[1m]) > 5"
              intervalMs: 10000
              maxDataPoints: 100
              refId: A
        noDataState: NoData
        execErrState: Error
        for: 30s
        annotations:
          summary: "Latencia media acima de 5 segundos detectada"
        labels:
          severity: critical
